name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Weekly security scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Checkout tiredvpn core
        uses: actions/checkout@v6
        with:
          repository: tiredvpn/tiredvpn
          path: tiredvpn-core

      - name: Setup Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: tiredvpn-core/go.mod

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Build JNI libraries
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          ./scripts/build-jni.sh --core-dir "$GITHUB_WORKSPACE/tiredvpn-core"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Unit Tests
        run: ./gradlew test

      - name: Lint
        run: ./gradlew lint

  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze
        continue-on-error: true

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-dependency-check
          path: app/build/reports/dependency-check/
          retention-days: 30

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
