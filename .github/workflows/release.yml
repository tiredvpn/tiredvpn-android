name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Checkout tiredvpn core
        uses: actions/checkout@v6
        with:
          repository: tiredvpn/tiredvpn
          path: tiredvpn-core

      - name: Setup Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: tiredvpn-core/go.mod

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Build JNI libraries
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          ./scripts/build-jni.sh --core-dir "$GITHUB_WORKSPACE/tiredvpn-core"

      - name: Unit Tests
        run: ./gradlew test

      - name: Lint
        run: ./gradlew lint

  release:
    runs-on: ubuntu-latest
    needs: [test]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Checkout tiredvpn core
        uses: actions/checkout@v6
        with:
          repository: tiredvpn/tiredvpn
          path: tiredvpn-core

      - name: Setup Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: tiredvpn-core/go.mod

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Build JNI libraries
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          ./scripts/build-jni.sh --core-dir "$GITHUB_WORKSPACE/tiredvpn-core"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/release.keystore"

      - name: Prepare APK
        id: apk
        run: |
          TAG="${{ github.ref_name }}"
          SRC=$(find app/build/outputs/apk/release -name '*.apk' -type f | sort | tail -1)
          DEST="tiredvpn-${TAG}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: ${{ steps.apk.outputs.path }}
